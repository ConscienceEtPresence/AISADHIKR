  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-gold: #d4af37;
      --accent-gold-light: #f3e5ab;
      --accent-gold-dim: #8a7018;
      --accent-gold-transparent: rgba(212, 175, 55, 0.2);
      --font-ar: 'Amiri', serif;
      --font-fr: 'Inter', sans-serif;
      --font-title: 'Cinzel', serif;
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --topbar-h: 60px;
      --navbar-h: 80px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: var(--font-fr);
      background-color: var(--bg-color);
      color: var(--text-main);
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    /* --- PAGE D'ACCUEIL (INTRO) --- */
    #intro {
      position: fixed; inset: 0; z-index: 300;
      background: radial-gradient(circle at center, var(--card-bg) 0%, var(--bg-color) 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 20px;
      padding-top: calc(20px + var(--safe-top));
      transition: opacity 1s ease, transform 1s ease;
      will-change: opacity, transform;
    }
    #intro.fade-out { opacity: 0; pointer-events: none; transform: scale(1.05); }

    .intro-content {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
      width: 100%; max-width: 600px;
    }

    .intro-logo-img {
      width: 45px; height: auto;
      margin-top: 30px; margin-bottom: 10px; opacity: 0.9;
    }

    .intro-symbol {
      font-size: clamp(2rem, 5vw, 2.5rem); color: var(--accent-gold); margin-bottom: 20px; opacity: 0.8;
      animation: pulse 3s infinite ease-in-out;
      will-change: opacity, transform;
    }

    .ar-title {
      font-family: var(--font-ar); font-size: clamp(1.8rem, 6vw, 2.8rem); line-height: 1.4; color: var(--accent-gold);
      font-weight: 700; margin: 0 0 10px 0; text-shadow: 0 0 20px var(--accent-gold-transparent);
    }
    [lang="ar"] { direction: rtl; }

    .ar-subtitle {
      font-family: var(--font-ar); font-size: clamp(0.9rem, 2.5vw, 1.1rem); color: var(--text-muted);
      margin-bottom: 40px; font-weight: 400; letter-spacing: 0.5px;
    }

    .fr-title {
      font-family: var(--font-title);
      font-size: clamp(1rem, 3vw, 1.3rem);
      text-transform: uppercase;
      letter-spacing: clamp(1px, 0.5vw, 3px);
      color: var(--text-main);
      margin: 0 0 15px 0;
      border-top: 1px solid rgba(212, 175, 55, 0.3);
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      padding: 15px 0;
      width: 100%;
    }
    .fr-subtitle {
      font-family: var(--font-fr); font-size: 0.9rem; font-weight: 300;
      color: var(--text-muted); font-style: italic; line-height: 1.6; max-width: 80%;
    }

    .btn-enter {
      margin-top: 40px; padding: 14px 50px; background: transparent;
      border: 1px solid var(--accent-gold); color: var(--accent-gold);
      font-family: var(--font-title); font-size: 0.9rem; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; border-radius: 2px;
      transition: all 0.4s ease;
      min-height: 48px;
    }
    .btn-enter:hover, .btn-enter:focus-visible {
      background: rgba(212, 175, 55, 0.1);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
    }

    .intro-footer {
      font-size: 0.65rem;
      color: var(--text-muted);
      opacity: 0.5;
      font-family: var(--font-fr);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 20px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* --- APPLICATION --- */
    #app {
      display: flex; flex-direction: column; height: 100%;
      position: relative; overflow: hidden; opacity: 0; transition: opacity 1s ease;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }
    #app.visible { opacity: 1; }

    .topbar {
      height: var(--topbar-h); display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 100; flex-shrink: 0;
    }
    .brand {
      font-family: var(--font-title); color: var(--accent-gold);
      font-size: 1rem; letter-spacing: 1px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; background: none; border: none; padding: 8px 4px;
      min-height: 44px;
    }
    .nav-logo-img { height: 24px; width: auto; }
    .menu-btn {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.4rem; cursor: pointer; padding: 8px;
      min-width: 44px; min-height: 44px;
      display: grid; place-items: center;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .menu-btn:hover, .menu-btn:focus-visible {
      background: rgba(255,255,255,0.05);
    }
    .menu-btn:active {
      background: rgba(255,255,255,0.1);
    }

    .book-container {
      flex: 1; position: relative; perspective: 1000px;
      display: flex; align-items: center; justify-content: center;
      touch-action: pan-y;
      overflow: hidden;
    }

    .page-card {
      position: absolute; width: 88%; max-width: 550px;
      height: 78%;
      background: var(--card-bg); border-radius: 12px;
      padding: 10px 15px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      display: flex; flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.5s var(--ease-spring), opacity 0.4s ease;
      border: 1px solid rgba(255,255,255,0.03);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-gold-dim) transparent;
      will-change: transform, opacity;
    }
    .card-content-wrapper {
      margin: auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .long-text-fr {
      text-align: justify;
      text-justify: inter-word;
      line-height: 1.6;
      font-size: 1rem;
      padding: 0 5px;
    }
    .page-card.active { transform: translate3d(0, 0, 0) scale(1); opacity: 1; z-index: 10; }
    .page-card.slide-out-left { transform: translate3d(-120%, 0, -100px) rotateY(10deg); opacity: 0; z-index: 5; }
    .page-card.slide-out-right { transform: translate3d(120%, 0, -100px) rotateY(-10deg); opacity: 0; z-index: 5; }
    .page-card.next { transform: translate3d(0, 0, -60px) scale(0.92); opacity: 0.3; z-index: 5; cursor: pointer; }

    .card-img {
      width: 100px; height: 100px; border-radius: 50%; object-fit: contain;
      background: rgba(0,0,0,0.2);
      margin-bottom: 15px; border: 1px solid var(--accent-gold);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3); padding: 5px;
      flex-shrink: 0;
    }

    /* STYLES POUR LES PAGES DE TITRE */
    .title-page-ar {
      font-family: var(--font-ar); font-size: clamp(2rem, 6vw, 3rem); color: var(--accent-gold);
      line-height: 1.2; margin-bottom: 20px; text-shadow: 0 0 30px var(--accent-gold-transparent);
      direction: rtl;
    }
    .title-page-divider {
      font-size: 2rem; color: var(--text-muted); opacity: 0.5; margin: 15px 0;
    }
    .title-page-fr {
      font-family: var(--font-title); font-size: clamp(1rem, 3vw, 1.3rem); color: var(--text-main);
      text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px;
    }
    .title-page-sub {
      font-family: var(--font-fr); font-size: 0.9rem; color: var(--text-muted); font-style: italic;
    }

    /* STYLES POUR LES PAGES DE CITATION */
    .quote-ar {
      font-family: var(--font-ar); font-size: clamp(1.6rem, 4.5vw, 2.2rem); color: var(--accent-gold);
      line-height: 1.6; margin-bottom: 25px; direction: rtl;
      text-shadow: 0 0 10px var(--accent-gold-transparent);
    }
    .quote-fr {
      font-family: var(--font-fr); font-size: 1.1rem; color: var(--text-main);
      font-style: italic; line-height: 1.6; margin-bottom: 15px;
      font-weight: 300;
    }
    .quote-ref {
      font-family: var(--font-title); font-size: 0.9rem; color: var(--text-muted);
      margin-top: 20px; letter-spacing: 1px;
    }
    .quote-decoration {
      font-size: 2rem; color: var(--accent-gold-dim); margin: 20px 0; opacity: 0.7;
    }

    .verse-ar {
      font-family: var(--font-ar); font-size: clamp(1.3rem, 3.5vw, 1.6rem); line-height: 1.8;
      color: var(--accent-gold); margin-bottom: 20px; direction: rtl;
    }
    .verse-tr {
      font-size: 0.9rem; color: var(--text-muted); font-style: italic; margin-bottom: 15px;
    }
    .verse-fr { font-size: 1rem; color: var(--text-main); line-height: 1.5; }

    /* Scrollbar Styling */
    .scrollable-content {
      overflow-y: auto; width: 100%; flex: 1;
      padding: 10px 5px; margin-top: 10px;
      scrollbar-width: thin; scrollbar-color: var(--accent-gold-dim) transparent;
    }

    .long-text-ar {
      font-family: var(--font-ar); font-size: 1.3rem; line-height: 2;
      color: var(--text-main); text-align: justify; direction: rtl;
    }

    .long-text-fr a {
      color: var(--accent-gold); text-decoration: none; border-bottom: 1px dashed var(--accent-gold); transition: all 0.2s;
    }
    .long-text-fr a:hover { color: #fff; border-bottom-style: solid; }

    .bismillah {
      font-family: var(--font-ar); color: var(--accent-gold); font-size: 1.4rem; margin-bottom: 25px; opacity: 0.7;
    }

    .nav-bar {
      height: var(--navbar-h); display: flex; align-items: center; justify-content: center; gap: 25px;
      background: linear-gradient(to top, var(--bg-color) 20%, transparent);
      z-index: 50; flex-shrink: 0;
      padding-bottom: 10px;
    }
    .nav-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02);
      color: var(--text-muted); font-size: 1.1rem; cursor: pointer;
      display: grid; place-items: center; transition: all 0.2s;
    }
    .nav-btn:active { background: var(--accent-gold); color: #000; border-color: var(--accent-gold); }
    .nav-btn:focus-visible {
      outline: 2px solid var(--accent-gold);
      outline-offset: 2px;
    }
    .nav-btn.main-action {
      width: 55px; height: 55px; background: rgba(212, 175, 55, 0.1);
      color: var(--accent-gold); border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .progress-line {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: var(--accent-gold);
      width: 100%;
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
      z-index: 100; opacity: 0.7;
    }

    /* Sommaire & Settings */
    .overlay-menu {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 200;
      transform: translateY(100%); transition: transform 0.5s var(--ease-spring);
      padding: 30px 20px;
      padding-top: calc(30px + var(--safe-top));
      padding-bottom: calc(20px + var(--safe-bottom));
      display: flex; flex-direction: column;
      will-change: transform;
    }
    .overlay-menu.open { transform: translateY(0); }
    .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
    .menu-title { font-family: var(--font-title); font-size: 1.4rem; color: var(--accent-gold); }
    .close-btn {
      background: none; border: none; color: var(--text-main); font-size: 1.8rem; cursor: pointer;
      min-width: 44px; min-height: 44px;
      display: grid; place-items: center;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .close-btn:hover, .close-btn:focus-visible { background: rgba(255,255,255,0.05); }

    .toc-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
    .toc-item {
      padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer; display: flex; flex-direction: row; justify-content: space-between; align-items: center;
      transition: color 0.2s;
      min-height: 48px;
    }
    .toc-item:hover { color: var(--accent-gold); }
    .toc-item.active-chapter { color: var(--accent-gold); }
    .toc-titles { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .toc-ar { font-family: var(--font-ar); font-size: 1.1rem; direction: rtl; text-align: right; }
    .toc-fr { font-size: 0.8rem; color: var(--text-muted); text-align: left; }

    .settings-panel {
      position: absolute; top: calc(var(--topbar-h) + 10px); right: 20px; background: #263346;
      border-radius: 12px; padding: 20px; width: 220px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6); opacity: 0; pointer-events: none;
      transform: translateY(-10px); transition: all 0.3s ease; z-index: 90;
    }
    .settings-panel.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.95rem; }
    .toggle-switch {
      width: 44px; height: 28px; background: #3c4b61; border-radius: 20px; position: relative; cursor: pointer;
      border: none; padding: 0;
      min-width: 44px; min-height: 28px;
    }
    .toggle-switch::after {
      content:''; position: absolute; top: 4px; left: 4px;
      width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.3s;
    }
    .toggle-switch.on { background: var(--accent-gold); }
    .toggle-switch.on::after { transform: translateX(16px); background: #000; }
    .settings-backdrop {
      position: fixed; inset: 0; z-index: 89; display: none;
    }
    .settings-backdrop.show { display: block; }

    /* Focus visible global */
    :focus-visible {
      outline: 2px solid var(--accent-gold);
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) {
      outline: none;
    }

    /* ========== RESPONSIVE ========== */

    /* Petits telephones (< 380px) */
    @media (max-width: 380px) {
      :root {
        --topbar-h: 50px;
        --navbar-h: 70px;
      }
      .ar-title { margin-bottom: 5px; }
      .ar-subtitle { margin-bottom: 20px; }
      .fr-subtitle { font-size: 0.8rem; max-width: 95%; }
      .btn-enter { padding: 12px 35px; margin-top: 25px; }
      .page-card { width: 92%; padding: 8px 10px; height: 80%; }
      .verse-ar { margin-bottom: 12px; }
      .quote-fr { font-size: 1rem; }
      .nav-bar { gap: 15px; }
      .topbar { padding: 0 12px; }
      .brand { font-size: 0.85rem; }
      .settings-panel { right: 10px; width: 200px; }
    }

    /* Telephones moyens (381px - 480px) */
    @media (min-width: 381px) and (max-width: 480px) {
      .page-card { width: 90%; height: 78%; }
    }

    /* Tablettes (481px - 1024px) */
    @media (min-width: 481px) and (max-width: 1024px) {
      .page-card { max-width: 600px; height: 80%; max-height: 750px; }
      .topbar { padding: 0 30px; }
      .nav-bar { gap: 30px; }
    }

    /* Desktop (> 1024px) */
    @media (min-width: 1025px) {
      .page-card { max-width: 650px; height: 82%; max-height: 800px; }
      .topbar { padding: 0 40px; }
      .nav-bar { gap: 35px; }
      .intro-content { max-width: 700px; }
    }

    /* Paysage sur telephone */
    @media (max-height: 500px) and (orientation: landscape) {
      :root {
        --topbar-h: 45px;
        --navbar-h: 55px;
      }
      .page-card { height: 85%; max-height: none; }
      .intro-symbol { margin-bottom: 10px; }
      .ar-subtitle { margin-bottom: 15px; }
      .btn-enter { margin-top: 15px; padding: 10px 30px; }
      .nav-btn { width: 40px; height: 40px; }
      .nav-btn.main-action { width: 48px; height: 48px; }
    }
  </style>
</head>

  <div id="intro" role="dialog" aria-label="Page d'accueil">
    <div class="intro-content">
      <div class="intro-symbol" aria-hidden="true" id="introSymbol">&#1758;</div>
      <h1 class="ar-title" lang="ar" dir="rtl">&#1575;&#1604;&#1584;&#1603;&#1585; &#1575;&#1587;&#1576;&#1575;&#1576; &#1603;&#1604; &#1582;&#1610;&#1585;</h1>
      <p class="ar-subtitle" lang="ar" dir="rtl">&#1605;&#1602;&#1578;&#1591;&#1601;&#1575;&#1578; &#1605;&#1606; &#1571;&#1608;&#1585;&#1575;&#1583; &#1608;&#1571;&#1583;&#1593;&#1610;&#1577; &#1575;&#1604;&#1591;&#1585;&#1610;&#1602;&#1577; &#1575;&#1604;&#1593;&#1604;&#1575;&#1608;&#1610;&#1577; &#1575;&#1604;&#1583;&#1585;&#1602;&#1575;&#1608;&#1610;&#1577; &#1575;&#1604;&#1588;&#1575;&#1584;&#1604;&#1610;&#1577;</p>
      <h2 class="fr-title">Le Dhikr est source de tout bien</h2>
      <p class="fr-subtitle">Extraits de l'invocation et des prieres de la voie Alawiyya Darqawiyya Shadhiliyya</p>
      <button class="btn-enter" id="btnEnter" aria-label="Entrer dans l'application">Entrer</button>

  </div>

  <main id="app" role="main">
    <header class="topbar">
      <button class="brand" id="btnBrand" aria-label="Ouvrir le sommaire">
        <img src="logo.png" alt="" class="nav-logo-img" width="24" height="24" onerror="this.style.display='none'; document.getElementById('fallbackIcon').style.display='inline'">
        <span id="fallbackIcon" style="display:none" aria-hidden="true">&#128214;</span> Dhikr
      </button>
      <div style="display:flex; gap:10px;">
        <button class="menu-btn" id="btnSettings" aria-label="Parametres d'affichage">&#9881;&#65039;</button>
        <button class="menu-btn" id="btnMenu" aria-label="Ouvrir le sommaire">&#9776;</button>
      </div>
    </header>

    <div class="settings-backdrop" id="settingsBackdrop"></div>
    <div class="settings-panel" id="settingsPanel" role="region" aria-label="Parametres">
      <div class="toggle-row">
        <span id="labelAr">Arabe</span>
        <button class="toggle-switch on" id="toggleAr" role="switch" aria-checked="true" aria-labelledby="labelAr"></button>
      </div>
      <div class="toggle-row">
        <span id="labelTr">Phonetique</span>
        <button class="toggle-switch on" id="toggleTr" role="switch" aria-checked="true" aria-labelledby="labelTr"></button>
      </div>
      <div class="toggle-row">
        <span id="labelFr">Francais</span>
        <button class="toggle-switch on" id="toggleFr" role="switch" aria-checked="true" aria-labelledby="labelFr"></button>
      </div>

    <section class="book-container" id="bookContainer" aria-live="polite" aria-label="Contenu de lecture"></section>
    <div class="progress-line" id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>

    <nav class="nav-bar" aria-label="Navigation des pages">
      <button class="nav-btn" id="btnPrev" aria-label="Page precedente">&#8592;</button>
      <button class="nav-btn main-action" id="btnPlay" aria-label="Lecture automatique">&#9654;</button>
      <button class="nav-btn" id="btnNext" aria-label="Page suivante">&#8594;</button>
    </nav>
  </main>

  <div class="overlay-menu" id="tocMenu" role="dialog" aria-label="Sommaire" aria-modal="true">
    <div class="menu-header">
      <div class="menu-title">Sommaire / <span lang="ar" dir="rtl">&#1601;&#1607;&#1585;&#1587;</span></div>
      <button class="close-btn" id="btnCloseToc" aria-label="Fermer le sommaire">&times;</button>
    </div>
    <ul class="toc-list" id="tocList" role="list"></ul>
  </div>

<script>
/* --- CONSTANTES --- */
const ANIM_DURATION = 400;
const AUTOPLAY_INTERVAL = 5000;
const SWIPE_THRESHOLD = 50;
const STORAGE_KEY = 'aisadhikr_state';

/* --- STATE --- */
let state = {
  chapter: 0,
  page: 0,
  settings: { showAr: true, showTr: true, showFr: true },
  autoPlay: false
};

let interval = null;
let isAnimating = false;

/* --- PERSISTANCE localStorage --- */
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      chapter: state.chapter,
      page: state.page,
      settings: state.settings
    }));
  } catch(e) { /* quota exceeded or private mode */ }
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.chapter < DATA.length) {
        state.chapter = parsed.chapter;
        const ch = DATA[state.chapter];
        if (parsed.page < ch.content.length) {
          state.page = parsed.page;
        }
      }
      if (parsed.settings) {
        state.settings = { ...state.settings, ...parsed.settings };
      }
    }
  } catch(e) { /* corrupted data */ }
}

/* --- INITIALISATION --- */
function startApp() {
  const intro = document.getElementById('intro');
  const app = document.getElementById('app');

  intro.classList.add('fade-out');
  setTimeout(() => {
    app.classList.add('visible');
    intro.style.display = 'none';
    loadChapter(state.chapter, state.page);
    renderToc();
    syncToggles();
  }, 600);
}

function syncToggles() {
  const map = { showAr: 'toggleAr', showTr: 'toggleTr', showFr: 'toggleFr' };
  for (const [key, id] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (state.settings[key]) {
      el.classList.add('on');
      el.setAttribute('aria-checked', 'true');
    } else {
      el.classList.remove('on');
      el.setAttribute('aria-checked', 'false');
    }
  }
}

/* --- RENDU --- */
function renderCurrentPage() {
  const container = document.getElementById('bookContainer');
  const ch = DATA[state.chapter];
  const item = ch.content[state.page];
  const progressBar = document.getElementById('progressBar');

  container.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'page-card active';

  let html = '<div class="card-content-wrapper">';

  // CAS 1: PAGE DE CITATION
  if (item.isQuote) {
    html += '<div class="quote-decoration" aria-hidden="true">&#1758;</div>';
    if (state.settings.showAr) html += '<div class="quote-ar" lang="ar" dir="rtl">' + item.ar + '</div>';
    if (state.settings.showFr) html += '<div class="quote-fr">' + item.fr + '</div>';
    if (item.sub) html += '<div class="quote-ref">' + item.sub + '</div>';
    html += '<div class="quote-decoration" aria-hidden="true" style="transform:rotate(180deg)">&#1758;</div>';
    html += '</div>';
    card.innerHTML = html;
    container.appendChild(card);
    updateProgress(ch);
    saveState();
    return;
  }

  // CAS 2: PAGE DE TITRE
  if (item.isTitlePage) {
    html += '<div class="title-page-ar" lang="ar" dir="rtl">' + item.ar + '</div>';
    html += '<div class="title-page-divider" aria-hidden="true">&#1758;</div>';
    html += '<div class="title-page-fr">' + item.fr + '</div>';
    if (item.sub) html += '<div class="title-page-sub">' + item.sub + '</div>';
    html += '</div>';
    card.innerHTML = html;
    container.appendChild(card);
    updateProgress(ch);
    saveState();
    return;
  }

  // CAS 3: PAGE NORMALE
  if (state.page === 0 && !item.isLongText && !item.isQuote) {
    html += '<div class="bismillah" aria-hidden="true">&#1758;</div>';
    html += '<h3 style="color:var(--accent-gold); margin:0 0 5px 0; font-family:var(--font-ar); direction:rtl; font-size:1.6rem;" lang="ar" dir="rtl">' + ch.title + '</h3>';
    html += '<p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:25px; font-style:italic;">' + ch.desc + '</p>';
  }

  if (item.img) {
    html += '<img src="' + item.img + '" class="card-img" alt="" width="100" height="100" onerror="this.style.display=\'none\'" />';
  }

  if (item.isLongText) {
    html += '<div class="scrollable-content">';
  }

  /* --- LOGIQUE D'AFFICHAGE DU CONTENU --- */
  if (ch.id === 'preface') {
    if (state.settings.showFr && item.fr) {
      html += '<div class="long-text-fr">' + item.fr + '</div>';
    }
    if (state.settings.showAr && item.arBody) {
      html += '<div class="long-text-ar" lang="ar" dir="rtl">' + item.arBody + '</div>';
    }
  } else {
    if (state.settings.showAr) {
      if (item.arBody) html += '<div class="long-text-ar" lang="ar" dir="rtl">' + item.arBody + '</div><br>';
      else if (item.ar) {
        if (item.isLongText) html += '<h3 style="color:var(--accent-gold); font-family:var(--font-ar); margin:5px 0; direction:rtl;" lang="ar" dir="rtl">' + item.ar + '</h3>';
        else html += '<div class="verse-ar" lang="ar" dir="rtl">' + item.ar + '</div>';
      }
    }

    if (state.settings.showTr && item.tr) {
      if (!item.isLongText) html += '<div class="verse-tr">' + item.tr + '</div>';
    }

    if (state.settings.showFr && item.fr) {
      if (item.isLongText) html += '<div class="long-text-fr">' + item.fr + '</div>';
      else html += '<div class="verse-fr">' + item.fr + '</div>';
    }
  }

  if (item.isLongText) {
    html += '</div>';
  }
  html += '</div>';
  card.innerHTML = html;

  if (state.page < ch.content.length - 1) {
    const next = document.createElement('div');
    next.className = 'page-card next';
    next.setAttribute('aria-hidden', 'true');
    next.innerHTML = '<div style="opacity:0.5; font-size:2rem;">...</div>';
    container.appendChild(next);
  }
  container.appendChild(card);

  updateProgress(ch);
  saveState();
}

function updateProgress(ch) {
  const progressBar = document.getElementById('progressBar');
  const pct = ((state.page + 1) / ch.content.length);
  progressBar.style.transform = 'scaleX(' + pct + ')';
  progressBar.setAttribute('aria-valuenow', Math.round(pct * 100));
}

/* --- NAVIGATION --- */
function nextPage() {
  if (isAnimating) return;
  const ch = DATA[state.chapter];
  if (state.page < ch.content.length - 1) {
    isAnimating = true;
    const current = document.querySelector('.page-card.active');
    if (current) {
      current.classList.remove('active');
      current.classList.add('slide-out-left');
    }
    setTimeout(function() {
      state.page++;
      renderCurrentPage();
      isAnimating = false;
    }, ANIM_DURATION);
  } else if (state.chapter < DATA.length - 1) {
    loadChapter(state.chapter + 1);
  } else if (state.autoPlay) {
    // Fin du livre : arreter l'auto-play
    togglePlay();
  }
}

function prevPage() {
  if (isAnimating) return;
  if (state.page > 0) {
    isAnimating = true;
    const current = document.querySelector('.page-card.active');
    if (current) {
      current.classList.remove('active');
      current.classList.add('slide-out-right');
    }
    setTimeout(function() {
      state.page--;
      renderCurrentPage();
      isAnimating = false;
    }, ANIM_DURATION);
  } else if (state.chapter > 0) {
    state.chapter--;
    state.page = DATA[state.chapter].content.length - 1;
    renderCurrentPage();
    renderToc();
  }
}

function loadChapter(idx, page) {
  if (idx < 0 || idx >= DATA.length) return;
  state.chapter = idx;
  state.page = page || 0;
  renderCurrentPage();
  renderToc();
  closeToc();
}

/* --- TABLE DES MATIERES --- */
function renderToc() {
  const list = document.getElementById('tocList');
  list.innerHTML = '';
  DATA.forEach(function(ch, i) {
    const li = document.createElement('li');
    li.className = 'toc-item' + (i === state.chapter ? ' active-chapter' : '');
    li.setAttribute('role', 'listitem');
    li.setAttribute('tabindex', '0');
    li.onclick = function() { loadChapter(i); };
    li.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); loadChapter(i); } };
    li.innerHTML = '<div class="toc-titles"><span class="toc-ar" lang="ar" dir="rtl">' + ch.title + '</span><span class="toc-fr">' + ch.desc + '</span></div>';
    list.appendChild(li);
  });
}

function openToc() {
  const menu = document.getElementById('tocMenu');
  menu.classList.add('open');
  // Focus trap
  setTimeout(function() {
    document.getElementById('btnCloseToc').focus();
  }, 100);
}
function closeToc() {
  document.getElementById('tocMenu').classList.remove('open');
}

/* --- SETTINGS --- */
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const backdrop = document.getElementById('settingsBackdrop');
  const isOpen = panel.classList.contains('show');
  panel.classList.toggle('show');
  backdrop.classList.toggle('show');
  if (!isOpen) {
    document.getElementById('toggleAr').focus();
  }
}

function toggleOption(key, el) {
  state.settings[key] = !state.settings[key];
  el.classList.toggle('on');
  el.setAttribute('aria-checked', String(state.settings[key]));
  renderCurrentPage();
  saveState();
}

/* --- AUTO-PLAY --- */
function togglePlay() {
  state.autoPlay = !state.autoPlay;
  const btn = document.getElementById('btnPlay');
  btn.innerText = state.autoPlay ? '\u23F8' : '\u25B6';
  btn.style.background = state.autoPlay ? 'var(--accent-gold)' : '';
  btn.style.color = state.autoPlay ? '#000' : '';
  btn.setAttribute('aria-label', state.autoPlay ? 'Arreter la lecture automatique' : 'Lecture automatique');
  if (state.autoPlay) {
    clearInterval(interval);
    interval = setInterval(nextPage, AUTOPLAY_INTERVAL);
  } else {
    clearInterval(interval);
    interval = null;
  }
}

/* --- SWIPE TOUCH --- */
(function initSwipe() {
  let touchStartX = 0;
  let touchStartY = 0;
  let touchEndX = 0;
  let touchEndY = 0;
  let isSwiping = false;

  const container = document.getElementById('bookContainer');
  if (!container) return;

  container.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
    isSwiping = true;
  }, { passive: true });

  container.addEventListener('touchmove', function(e) {
    if (!isSwiping) return;
    touchEndX = e.changedTouches[0].screenX;
    touchEndY = e.changedTouches[0].screenY;
  }, { passive: true });

  container.addEventListener('touchend', function(e) {
    if (!isSwiping) return;
    isSwiping = false;
    touchEndX = e.changedTouches[0].screenX;
    touchEndY = e.changedTouches[0].screenY;

    const deltaX = touchEndX - touchStartX;
    const deltaY = touchEndY - touchStartY;

    // Horizontal swipe only if it's more horizontal than vertical
    if (Math.abs(deltaX) > SWIPE_THRESHOLD && Math.abs(deltaX) > Math.abs(deltaY)) {
      if (deltaX < 0) {
        nextPage(); // Swipe gauche = page suivante
      } else {
        prevPage(); // Swipe droite = page precedente
      }
    }
  }, { passive: true });
})();

/* --- CLAVIER --- */
document.addEventListener('keydown', function(e) {
  // Ne pas capturer si on est dans un input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    nextPage();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    prevPage();
  }
  if (e.key === ' ') {
    e.preventDefault();
    nextPage();
  }
  if (e.key === 'Escape') {
    closeToc();
    const panel = document.getElementById('settingsPanel');
    if (panel.classList.contains('show')) toggleSettings();
  }
});

/* --- EVENT LISTENERS (pas de inline onclick) --- */
document.getElementById('btnEnter').addEventListener('click', startApp);
document.getElementById('btnBrand').addEventListener('click', openToc);
document.getElementById('btnSettings').addEventListener('click', toggleSettings);
document.getElementById('btnMenu').addEventListener('click', openToc);
document.getElementById('btnCloseToc').addEventListener('click', closeToc);
document.getElementById('btnPrev').addEventListener('click', prevPage);
document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('btnNext').addEventListener('click', nextPage);
document.getElementById('settingsBackdrop').addEventListener('click', toggleSettings);

document.getElementById('toggleAr').addEventListener('click', function() { toggleOption('showAr', this); });
document.getElementById('toggleTr').addEventListener('click', function() { toggleOption('showTr', this); });
document.getElementById('toggleFr').addEventListener('click', function() { toggleOption('showFr', this); });

/* --- DEMARRAGE --- */
loadState();

/* --- SERVICE WORKER --- */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
